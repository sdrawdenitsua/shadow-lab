name: Build Shadow Lab APK (Godot)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    env:
      GODOT_VERSION: "4.3"
      GODOT_RELEASE: "stable"
      EXPORT_NAME: "ShadowLab"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses || true

      - name: Install Android NDK + build tools
        run: sdkmanager "build-tools;34.0.0" "platforms;android-34" "ndk;25.2.9519653"

      - name: Cache Godot engine + templates
        id: cache-godot
        uses: actions/cache@v4
        with:
          path: |
            /usr/local/bin/godot
            ~/.local/share/godot/export_templates
          key: godot-${{ env.GODOT_VERSION }}-${{ env.GODOT_RELEASE }}-v5

      - name: Install Godot ${{ env.GODOT_VERSION }}
        if: steps.cache-godot.outputs.cache-hit != 'true'
        run: |
          wget -q "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-${GODOT_RELEASE}/Godot_v${GODOT_VERSION}-${GODOT_RELEASE}_linux.x86_64.zip" -O godot.zip
          unzip -q godot.zip
          sudo mv "Godot_v${GODOT_VERSION}-${GODOT_RELEASE}_linux.x86_64" /usr/local/bin/godot
          sudo chmod +x /usr/local/bin/godot
          godot --version

      - name: Install Godot export templates
        if: steps.cache-godot.outputs.cache-hit != 'true'
        run: |
          TPL_DIR=~/.local/share/godot/export_templates/${GODOT_VERSION}.${GODOT_RELEASE}
          mkdir -p "$TPL_DIR"
          wget -q "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-${GODOT_RELEASE}/Godot_v${GODOT_VERSION}-${GODOT_RELEASE}_export_templates.tpz" -O templates.tpz
          unzip -q templates.tpz -d /tmp/godot_tpl
          mv /tmp/godot_tpl/templates/* "$TPL_DIR/"
          ls "$TPL_DIR/" | grep android

      - name: Decode keystore
        run: echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > /tmp/release.keystore

      - name: Write Godot editor settings
        run: |
          mkdir -p ~/.config/godot
          keytool -genkeypair -v -keystore /tmp/debug.keystore -alias androiddebugkey -keyalg RSA -keysize 2048 -validity 10000 -storepass android -keypass android -dname "CN=Android Debug,O=Android,C=US"
          ls -lh /tmp/debug.keystore
          python3 -c "
content = '''[gd_resource type=\"EditorSettings\" format=3]

[resource]
export/android/android_sdk_path = \"/usr/local/lib/android/sdk\"
export/android/debug_keystore = \"/tmp/debug.keystore\"
export/android/debug_keystore_user = \"androiddebugkey\"
export/android/debug_keystore_pass = \"android\"
'''
with open('/root/.config/godot/editor_settings-4.tres', 'w') as f:
    f.write(content)
print('Editor settings written OK')
"
          cat ~/.config/godot/editor_settings-4.tres

      - name: Create build directory
        run: mkdir -p build

      - name: Verify export templates installed
        run: |
          TPL_DIR=~/.local/share/godot/export_templates/4.3.stable
          echo "=== Template dir contents ==="
          ls -lh "$TPL_DIR" 2>/dev/null || echo "MISSING: $TPL_DIR"
          echo "=== Android templates ==="
          ls "$TPL_DIR"/*android* 2>/dev/null || echo "NO android templates found!"

      - name: Patch project.godot for Android CI export
        run: |
          sed -i 's/openxr\/enabled=true/openxr\/enabled=false/' Godot/project.godot
          sed -i 's/renderer\/rendering_method="forward_plus"/renderer\/rendering_method="mobile"/' Godot/project.godot
          echo "--- rendering + xr settings after patch ---"
          grep -E "rendering_method|openxr.enabled" Godot/project.godot

      - name: Import assets (first Godot pass - required for headless export)
        run: |
          godot --headless --path "$GITHUB_WORKSPACE/Godot" --editor --quit 2>&1 || true
          echo "Import pass complete."
          ls -la "$GITHUB_WORKSPACE/Godot/.godot/" 2>/dev/null || echo "No .godot dir yet"

      - name: Export APK (unsigned debug build)
        run: |
          godot --headless --verbose --path "$GITHUB_WORKSPACE/Godot" --export-debug "Android (Quest)" "$GITHUB_WORKSPACE/build/${EXPORT_NAME}.apk" 2>&1 || true
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Verify APK
        run: ls -lh build/

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ShadowLab-Quest-APK
          path: build/${{ env.EXPORT_NAME }}.apk
          retention-days: 30
