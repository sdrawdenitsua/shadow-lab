name: Build Shadow Lab APK (Godot)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    env:
      GODOT_VERSION: "4.3"
      GODOT_RELEASE: "stable"
      EXPORT_NAME: "ShadowLab"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses || true

      - name: Install Android build tools
        run: sdkmanager "build-tools;34.0.0" "platforms;android-34" "ndk;25.2.9519653"

      - name: Cache Godot engine + templates
        id: cache-godot
        uses: actions/cache@v4
        with:
          path: |
            /usr/local/bin/godot
            ~/.local/share/godot/export_templates
          key: godot-${{ env.GODOT_VERSION }}-${{ env.GODOT_RELEASE }}-v2

      - name: Install Godot ${{ env.GODOT_VERSION }}
        if: steps.cache-godot.outputs.cache-hit != 'true'
        run: |
          set -e
          GODOT_FILENAME="Godot_v${GODOT_VERSION}-${GODOT_RELEASE}_linux.x86_64"
          wget -q "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-${GODOT_RELEASE}/${GODOT_FILENAME}.zip" -O godot.zip
          unzip -q godot.zip
          sudo mv "${GODOT_FILENAME}" /usr/local/bin/godot
          sudo chmod +x /usr/local/bin/godot
          godot --version

      - name: Install Godot export templates
        if: steps.cache-godot.outputs.cache-hit != 'true'
        run: |
          set -e
          TPL_DIR=~/.local/share/godot/export_templates/${GODOT_VERSION}.${GODOT_RELEASE}
          mkdir -p "$TPL_DIR"
          TPL_URL="https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-${GODOT_RELEASE}/Godot_v${GODOT_VERSION}-${GODOT_RELEASE}_export_templates.tpz"
          wget -q "$TPL_URL" -O templates.tpz
          unzip -q templates.tpz -d /tmp/godot_tpl
          mv /tmp/godot_tpl/templates/* "$TPL_DIR/"
          echo "Templates installed to $TPL_DIR"
          ls "$TPL_DIR/" | grep android || echo "WARNING: no android template found"

      - name: Set up Android keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > /tmp/release.keystore
          echo "Keystore size: $(wc -c < /tmp/release.keystore) bytes"

      - name: Configure Godot Android SDK path
        run: |
          mkdir -p ~/.config/godot
          cat > ~/.config/godot/editor_settings-4.tres << 'EOF'
[gd_resource type="EditorSettings" format=3]

[resource]
export/android/android_sdk_path = "/usr/local/lib/android/sdk"
EOF

      - name: Create build output directory
        run: mkdir -p build

      - name: Export APK
        run: |
          cd Godot/project
          godot --headless --export-release "Android (Quest)" ../../build/${EXPORT_NAME}.apk 2>&1
        env:
          GODOT_ANDROID_KEYSTORE_RELEASE_PATH: /tmp/release.keystore
          GODOT_ANDROID_KEYSTORE_RELEASE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          GODOT_ANDROID_KEYSTORE_RELEASE_USER: ${{ secrets.ANDROID_KEY_ALIAS }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Verify APK
        run: |
          if [ -f "build/${EXPORT_NAME}.apk" ]; then
            echo "✅ APK built successfully"
            ls -lh build/
          else
            echo "❌ APK not found"
            find . -name "*.apk" 2>/dev/null || echo "No APK anywhere"
            exit 1
          fi

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ShadowLab-Quest-APK
          path: build/${{ env.EXPORT_NAME }}.apk
          retention-days: 30
