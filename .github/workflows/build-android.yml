name: Build Shadow Lab APK (Godot)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    env:
      GODOT_VERSION: "4.3"
      GODOT_RELEASE: "stable"
      EXPORT_NAME: "ShadowLab"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses || true

      - name: Install Android NDK + build tools
        run: sdkmanager "build-tools;34.0.0" "platforms;android-34" "ndk;25.2.9519653"

      - name: Cache Godot engine + templates
        id: cache-godot
        uses: actions/cache@v4
        with:
          path: |
            /usr/local/bin/godot
            ~/.local/share/godot/export_templates
          key: godot-${{ env.GODOT_VERSION }}-${{ env.GODOT_RELEASE }}-v3

      - name: Install Godot ${{ env.GODOT_VERSION }}
        if: steps.cache-godot.outputs.cache-hit != 'true'
        run: |
          set -e
          wget -q "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-${GODOT_RELEASE}/Godot_v${GODOT_VERSION}-${GODOT_RELEASE}_linux.x86_64.zip" -O godot.zip
          unzip -q godot.zip
          sudo mv "Godot_v${GODOT_VERSION}-${GODOT_RELEASE}_linux.x86_64" /usr/local/bin/godot
          sudo chmod +x /usr/local/bin/godot
          godot --version

      - name: Install Godot export templates
        if: steps.cache-godot.outputs.cache-hit != 'true'
        run: |
          set -e
          TPL_DIR=~/.local/share/godot/export_templates/${GODOT_VERSION}.${GODOT_RELEASE}
          mkdir -p "$TPL_DIR"
          wget -q "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-${GODOT_RELEASE}/Godot_v${GODOT_VERSION}-${GODOT_RELEASE}_export_templates.tpz" -O templates.tpz
          unzip -q templates.tpz -d /tmp/godot_tpl
          mv /tmp/godot_tpl/templates/* "$TPL_DIR/"
          ls "$TPL_DIR/" | grep android

      - name: Decode keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > /tmp/release.keystore
          echo "Keystore size: $(wc -c < /tmp/release.keystore) bytes"

      - name: Write Godot editor settings
        run: |
          mkdir -p ~/.config/godot
          printf '[gd_resource type="EditorSettings" format=3]\n\n[resource]\nexport/android/android_sdk_path = "/usr/local/lib/android/sdk"\n' > ~/.config/godot/editor_settings-4.tres

      - name: Patch export_presets with keystore
        run: |
          python3 -c "
content = open('Godot/project/export_presets.cfg').read()
patch = '''
keystore/release=\"/tmp/release.keystore\"
keystore/release_password=\"shadowlab123\"
keystore/release_user=\"shadowlab\"
'''
if 'keystore/release=' not in content:
    content = content.rstrip() + '\n' + patch
open('Godot/project/export_presets.cfg', 'w').write(content)
print('Patched OK')
print(open('Godot/project/export_presets.cfg').read())
"

      - name: Create build directory
        run: mkdir -p build

      - name: Export APK
        run: |
          cd Godot/project
          godot --headless --export-release "Android (Quest)" ../../build/${EXPORT_NAME}.apk 2>&1
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Verify APK
        run: |
          if [ -f "build/${EXPORT_NAME}.apk" ]; then
            echo "APK built successfully"
            ls -lh build/
          else
            echo "APK not found"
            find . -name "*.apk" 2>/dev/null
            exit 1
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ShadowLab-Quest-APK
          path: build/${{ env.EXPORT_NAME }}.apk
          retention-days: 30
