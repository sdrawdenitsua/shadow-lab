name: Unity License Activation
on:
  workflow_dispatch:

jobs:
  activate:
    name: Request Unity License File
    runs-on: ubuntu-latest
    steps:
      - name: Install Unity Hub
        run: |
          wget -qO - https://hub.unity3d.com/linux/keys/public | gpg --dearmor | sudo tee /usr/share/keyrings/Unity_Technologies_ApS.gpg > /dev/null
          sudo sh -c 'echo "deb [signed-by=/usr/share/keyrings/Unity_Technologies_ApS.gpg] https://hub.unity3d.com/linux/repos/deb stable main" > /etc/apt/sources.list.d/unityhub.list'
          sudo apt-get update -q
          sudo apt-get install -y unityhub

      - name: Install Unity Editor
        run: |
          unityhub --headless install --version 2022.3.20f1 --module android

      - name: Activate Unity License
        run: |
          unity-editor -quit -batchmode \
            -username "${{ secrets.UNITY_EMAIL }}" \
            -password "${{ secrets.UNITY_PASSWORD }}" \
            -logFile /tmp/unity_activation.log || true
          cat /tmp/unity_activation.log || true
          find / -name "*.ulf" 2>/dev/null | head -5

      - name: Upload license
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Unity_License
          path: |
            /root/.local/share/unity3d/Unity/Unity_lic.ulf
            /home/runner/.local/share/unity3d/Unity/Unity_lic.ulf
          retention-days: 1
